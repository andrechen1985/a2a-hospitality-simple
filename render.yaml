services:
  - type: web
    name: a2a-hospitality-simple
    env: docker
    plan: free
    region: oregon
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.15"
      - key: STREAMLIT_SERVER_PORT
        value: "8501"
      - key: STREAMLIT_SERVER_ADDRESS
        value: "0.0.0.0"
      - key: BACKEND_URL
        value: "http://localhost:8000"
    dockerCommand: "/start.sh"
